<section class="section">
  <h1>Prompt 构造器</h1>
  <p>选择行业、任务和语气，快速生成一个基础 Prompt 框架</p>
  <div class="tool-form">
    <div class="form-group">
      <label for="pb-industry">选择行业</label>
      <select id="pb-industry">
        <option value="">请选择行业</option>
        <option value="catering">餐饮与咖啡</option><option value="retail">零售与小电商</option><option value="beauty">美业与健身</option><option value="repair">维修与家政</option><option value="pet">宠物与本地服务</option><option value="education">教育培训</option>
      </select>
    </div>
    <div class="form-group">
      <label for="pb-task">选择任务</label>
      <select id="pb-task">
        <option value="">请选择任务类型</option>
        <option value="customer-service">客服回复</option><option value="campaign-copy">活动文案</option><option value="short-video">短视频脚本</option><option value="product-description">商品与服务描述</option><option value="recruitment">招聘与培训</option><option value="quotation">报价与合同前说明</option><option value="operations">运营表格</option><option value="review-checklist">复核清单</option>
      </select>
    </div>
    <div class="form-group">
      <label for="pb-tone">选择语气</label>
      <select id="pb-tone">
        <option value="friendly">亲切友好</option>
        <option value="professional">专业正式</option>
        <option value="casual">轻松随意</option>
        <option value="warm">温暖贴心</option>
      </select>
    </div>
    <div class="form-group">
      <label for="pb-extra">补充要求（可选）</label>
      <textarea id="pb-extra" rows="3" placeholder="如：字数限制、特殊格式要求等"></textarea>
    </div>
    <button class="btn btn-primary" onclick="generatePrompt()">生成 Prompt</button>
  </div>
  <div class="tool-output" id="pb-output" style="display:none;">
    <h3>生成的 Prompt</h3>
    <pre class="prompt-text" id="pb-result"></pre>
    <button class="btn-copy" onclick="copyGenerated()">复制</button>
  </div>
  <p class="tool-note">本工具在浏览器本地运行，不上传任何数据。</p>
</section>
