<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Business AI Templates</title>
<link rel="alternate" hreflang="zh" href="https://bizai.jtlcook.com/zh/">
<link rel="alternate" hreflang="en" href="https://bizai.jtlcook.com/en/">
<link rel="alternate" hreflang="x-default" href="https://bizai.jtlcook.com/en/">
<script>
(function(){
  var saved = localStorage.getItem('lang');
  if(saved === 'en') { window.location.replace('./en/'); return; }
  if(saved === 'zh') { window.location.replace('./zh/'); return; }
  var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if(lang.startsWith('zh')) { window.location.replace('./zh/'); }
  else { window.location.replace('./en/'); }
})();
</script>
</head>
<body>
<noscript>
<p><a href="./zh/">中文版</a> | <a href="./en/">English</a></p>
</noscript>
</body>
</html>
